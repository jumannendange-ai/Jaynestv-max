workflows:
  android-build:
    name: Android Build
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Set gradlew executable
        script: chmod +x gradlew

      - name: Clean project
        script: ./gradlew clean

      - name: Build APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
